<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- Modern Font: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Ghost Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stars-bg"></div>

    <main class="chat-container">
        <!-- Header -->
        <header class="chat-header glass-effect">
            <div class="logo-area">
                <i class="fa-solid fa-meteor logo-icon"></i>
                <h1 class="logo-text">Ghost Chat</h1>
            </div>
            <div class="user-info">
                <button id="sound-toggle" class="header-icon-btn" title="Toggle Sound"><i class="fa-solid fa-volume-high"></i></button>
                <button id="settings-btn" class="header-icon-btn" title="Settings"><i class="fa-solid fa-gear"></i></button>
                <span class="user-badge" id="user-badge">
                    <i class="fa-solid fa-user-astronaut"></i> <span id="user-id-display">Connecting...</span>
                </span>
                <div class="online-users-wrapper" id="online-users-wrapper" title="Online Users">
                    <span class="status-indicator online"></span>
                    <div id="online-dropdown" class="online-dropdown hidden glass-effect">
                        <div class="online-dropdown-header">Online Now: <span id="online-count">0</span></div>
                        <ul id="online-users-list"></ul>
                    </div>
                </div>
            </div>
            <div class="disclaimer-tooltip">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Messages dissolve after 24 hours.</span>
            </div>
        </header>

        <!-- Message Area -->
        <div class="chat-messages" id="chat-messages">
            <!-- Messages will be injected here via JS -->
        </div>

        <!-- Input Area -->
        <footer class="chat-input-area glass-effect">
            <div id="reply-banner" class="reply-banner hidden">
                <i class="fa-solid fa-reply"></i>
                <div class="reply-banner-content">
                    <div class="reply-banner-name" id="reply-banner-name">Name</div>
                    <div class="reply-banner-text" id="reply-banner-text">Text...</div>
                </div>
                <button class="remove-reply-btn" id="remove-reply-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="input-wrapper">
                <button type="button" class="action-btn plus-btn" id="plus-btn" title="More Actions">
                    <i class="fa-solid fa-plus"></i>
                </button>
                
                <div id="action-menu" class="action-menu hidden glass-effect">
                    <button type="button" class="action-btn emoji-btn" id="emoji-btn" title="Send Emoji">
                        <i class="fa-regular fa-face-smile"></i>
                    </button>
                    <button type="button" class="action-btn ghost-mode-btn" id="ghost-mode-btn" title="Ghost Mode (10s Self-Destruct)">
                        <i class="fa-solid fa-ghost"></i>
                    </button>
                    <button type="button" class="action-btn file-btn" id="file-btn" title="Upload Image">
                        <i class="fa-solid fa-image"></i>
                    </button>
                    <input type="file" id="file-input" accept="image/*" style="display: none;">
                    <button type="button" class="action-btn mic-btn" id="mic-btn" title="Voice Message (Tap to start/stop)">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                    <button type="button" class="action-btn nudge-btn" id="nudge-btn" title="Send a Nudge!">
                        <i class="fa-solid fa-hand-point-right"></i>
                    </button>
                </div>

                <textarea 
                    id="message-input" 
                    placeholder="Message" 
                    rows="1"
                    aria-label="Message Input"
                ></textarea>
                
                <button type="button" class="send-btn" id="send-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            
            <div id="upload-preview" class="upload-preview hidden">
                <span class="preview-text" id="preview-text"></span>
                <button class="remove-upload-btn" id="remove-upload-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div id="typing-indicator" class="typing-indicator hidden">
                <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
                <span class="typing-text">Someone is typing...</span>
            </div>
        </footer>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content glass-effect">
            <div class="modal-header">
                <h2>Customize Identity</h2>
                <button id="close-settings" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <label for="nickname-input">Nickname</label>
                <input type="text" id="nickname-input" class="text-input" placeholder="e.g. StarLord" maxlength="20">
                
                <label>Glow Color</label>
                <div class="color-picker" id="color-picker">
                    <!-- JS generated -->
                </div>
                
                <button id="save-settings-btn" class="save-btn glass-effect">Save changes</button>
            </div>
        </div>
    </div>

    <!-- Lightbox for Image Zoom -->
    <div id="lightbox" class="lightbox hidden">
        <button id="close-lightbox" class="close-lightbox"><i class="fa-solid fa-xmark"></i></button>
        <img id="lightbox-img" src="" alt="Zoomed image">
    </div>

    <!-- Supabase Client Setup (Added standard script for older devices) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
